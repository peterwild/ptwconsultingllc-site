<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBooks Authorization — PTW Consulting</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 600px; margin: 80px auto; padding: 0 24px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; font-weight: 600; }
    .field { margin: 20px 0; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #666; margin-bottom: 6px; }
    .value { font-family: monospace; font-size: 0.9rem; background: #f4f4f4; padding: 10px 14px; border-radius: 6px; word-break: break-all; }
    .copy-btn { margin-top: 8px; padding: 6px 14px; font-size: 0.85rem; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .copy-btn:active { background: #004ea8; }
    .error { color: #c00; }
    p { color: #444; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>QuickBooks Authorization</h1>
  <div id="content"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const realmId = params.get('realmId');
    const error = params.get('error');
    const el = document.getElementById('content');

    if (error) {
      el.innerHTML = `<p class="error">Authorization failed: ${error}</p><p>Close this tab and try again.</p>`;
    } else if (code && realmId) {
      el.innerHTML = `
        <p>Authorization successful. Copy the values below and paste them into your terminal.</p>
        <div class="field">
          <label>Auth Code</label>
          <div class="value" id="code">${code}</div>
          <button class="copy-btn" onclick="copy('code', this)">Copy</button>
        </div>
        <div class="field">
          <label>Realm ID</label>
          <div class="value" id="realm">${realmId}</div>
          <button class="copy-btn" onclick="copy('realm', this)">Copy</button>
        </div>
        <p>Once pasted, you can close this tab.</p>
      `;
    } else {
      el.innerHTML = `<p class="error">No authorization data found in URL.</p>`;
    }

    function copy(id, btn) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }
  </script>
</body>
</html>
